# studylog<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>付箋</title>
<style>
/* ============================================================
   デザイントークン
   ============================================================ */
:root{
  --bg:         #FAFAFA;
  --surface:    #FFFFFF;
  --border:     #E4E4E7;
  --text:       #18181B;
  --text-muted: #71717A;
  --accent:     #39FF14;
  --accent-ink: #0F1A0C;
  --danger:     #EF4444;
  --radius:     12px;
  --shadow:     0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lift:0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
  --font: Inter, "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, system-ui, sans-serif;
  --mono: ui-monospace, "SF Mono", Consolas, monospace;
}

*{ box-sizing:border-box; margin:0; padding:0; }
/* display を持つクラスに hidden 属性が負けないようにする */
[hidden]{ display:none !important; }
html,body{ height:100%; }
body{
  font-family:var(--font);
  font-size:14px; line-height:1.6; color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
body.modal-open{ overflow:hidden; }
body.is-dragging{ user-select:none; cursor:grabbing; }
button{ font-family:inherit; font-size:inherit; color:inherit; cursor:pointer; background:none; border:none; }
input,textarea,select{ font-family:inherit; font-size:inherit; color:inherit; }
.mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; }
.vh{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; }

/* フォーカスリング: 濃色リング（accent 単独はコントラスト不足のため不使用） */
:focus-visible{ outline:2px solid var(--text); outline-offset:2px; border-radius:4px; }
/* 主要ボタンのみ「ネオン芯 + 濃色ハロー」の二重リング */
.btn-primary:focus-visible{ outline:none; box-shadow:0 0 0 2px var(--accent), 0 0 0 4px var(--text); }

/* ============================================================
   ヘッダ
   ============================================================ */
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:12px 20px;
  background:rgba(250,250,250,.92); backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
}
.brand{ font-size:16px; font-weight:700; letter-spacing:.02em; margin-right:4px; white-space:nowrap; }
.searchbox{ position:relative; flex:1; max-width:360px; min-width:170px; }
.searchbox svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; stroke:var(--text-muted); pointer-events:none; }
#searchInput{
  width:100%; padding:7px 10px 7px 32px;
  border:1px solid var(--border); border-radius:8px;
  background:var(--surface); font-size:13px;
}
#searchInput::placeholder{ color:var(--text-muted); }
#sortSelect{
  padding:7px 8px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface); font-size:13px;
}
.topbar-spacer{ flex:1; }

/* 同期インジケータ */
.sync{
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 10px; border-radius:999px; border:1px solid transparent;
  font-size:12px; font-weight:500; color:var(--text-muted); white-space:nowrap;
}
.sync-dot{ width:7px; height:7px; border-radius:50%; background:var(--text-muted); flex:none; }
.sync[data-state="ok"] .sync-dot{ background:var(--text); }
.sync[data-state="syncing"] .sync-dot{ background:var(--text-muted); animation:pulse 1.2s ease-in-out infinite; }
.sync[data-state="offline"] .sync-dot{ background:transparent; border:1.5px solid var(--text-muted); }
.sync[data-state="error"]{ color:var(--danger); border-color:var(--danger); cursor:pointer; }
.sync[data-state="error"] .sync-dot{ background:var(--danger); }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.3} }

/* ボタン */
.btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 14px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface); font-size:13px; font-weight:500;
  white-space:nowrap;
  transition:border-color .12s, background .12s;
}
.btn:hover{ border-color:var(--text-muted); }
.btn.sm{ padding:4px 10px; font-size:12px; }
.btn-primary{
  background:var(--accent); border-color:var(--accent); color:var(--accent-ink);
  font-weight:600;
}
.btn-primary:hover{ filter:brightness(.94); }
.btn-danger{ border-color:var(--danger); color:var(--danger); background:var(--surface); }
.btn-danger:hover{ background:#FEF2F2; }
.iconbtn{
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
  padding:7px 10px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface); font-size:13px; color:var(--text-muted);
  white-space:nowrap; transition:border-color .12s, color .12s;
}
.iconbtn:hover{ border-color:var(--text-muted); color:var(--text); }
.iconbtn[aria-pressed="true"]{ border-color:var(--text); color:var(--text); }
.iconbtn svg{ width:15px; height:15px; stroke:currentColor; flex:none; }
.badge{
  min-width:16px; padding:0 4px; border-radius:999px;
  background:var(--danger); color:#fff;
  font-size:10px; font-weight:700; line-height:16px; text-align:center;
}

/* メニュー */
.menuwrap{ position:relative; }
.menupop{
  position:absolute; right:0; top:calc(100% + 6px); z-index:30;
  min-width:200px; padding:6px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow-lift);
}
.menupop button{
  display:block; width:100%; text-align:left;
  padding:8px 10px; border-radius:7px; font-size:13px;
}
.menupop button:hover{ background:var(--bg); }
.menupop .menu-hint{
  margin-top:6px; padding:8px 10px 4px; border-top:1px solid var(--border);
  font-size:11px; color:var(--text-muted); line-height:1.8;
}

/* ============================================================
   タグバー・ゴミ箱バー
   ============================================================ */
.tagbar{
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:10px 20px 0;
}
.chip{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 11px; border:1px solid var(--border); border-radius:999px;
  background:var(--surface); font-size:12px; font-weight:500; color:var(--text-muted);
  transition:border-color .12s, color .12s;
}
.chip:hover{ border-color:var(--text-muted); color:var(--text); }
.chip .chip-count{ font-size:10px; color:var(--text-muted); }
/* 選択中タグ = 差し色（画面内で注意を引く箇所） */
.chip.is-selected{
  background:var(--accent); border-color:var(--accent); color:var(--accent-ink);
  font-weight:600;
}
.chip.is-selected .chip-count{ color:var(--accent-ink); }

.trashbar{
  display:flex; align-items:center; gap:12px;
  margin:14px 20px 0; padding:10px 16px;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  font-size:13px; color:var(--text-muted);
}
.trashbar strong{ color:var(--text); }
.trashbar .spacer{ flex:1; }

/* ============================================================
   グリッド・カード
   ============================================================ */
main{ padding:16px 20px 48px; }
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
  gap:14px; align-items:start;
}
.card{
  position:relative;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow);
  padding:14px 16px 10px; cursor:pointer;
  transition:box-shadow .15s, transform .15s, border-color .15s;
  content-visibility:auto; contain-intrinsic-size:180px;
  overflow:hidden;
}
.card:hover{ box-shadow:var(--shadow-lift); transform:translateY(-1px); }
.card.is-active{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), var(--shadow); }
.card.dragging{ opacity:.45; pointer-events:none; box-shadow:var(--shadow-lift); }
.card.is-trash{ cursor:default; }
.card.is-trash .card-title, .card.is-trash .card-body{ color:var(--text-muted); }

.card-strip{ position:absolute; left:0; top:0; right:0; height:4px; }
.card-title{
  font-size:16px; font-weight:600; line-height:1.4;
  margin-bottom:4px; word-break:break-word;
}
.card-title.is-untitled{ color:var(--text-muted); font-weight:500; }
.card-body{
  font-size:14px; color:var(--text); white-space:pre-wrap; word-break:break-word;
  display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:6; overflow:hidden;
}
.card-meta{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:8px; }
.due{
  display:inline-flex; align-items:center; gap:5px;
  font-size:12px; font-weight:500; color:var(--text-muted);
  font-family:var(--mono);
}
.due.is-over{ color:var(--danger); font-weight:600; }
.due-dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); border:1px solid rgba(0,0,0,.25); flex:none; }
.progress{ font-size:12px; font-weight:500; color:var(--text-muted); font-family:var(--mono); }
.tagchips{ display:flex; gap:4px; flex-wrap:wrap; margin-top:8px; }
.tagchips .mini{
  padding:1px 8px; border-radius:999px;
  background:var(--bg); border:1px solid var(--border);
  font-size:11px; color:var(--text-muted);
}
.card-foot{
  display:flex; align-items:center; justify-content:space-between;
  margin-top:10px; padding-top:8px; border-top:1px solid var(--border);
}
.card-time{ font-size:12px; font-weight:500; color:var(--text-muted); }
.card-actions{ display:flex; gap:2px; opacity:0; transition:opacity .12s; }
.card:hover .card-actions, .card:focus-within .card-actions{ opacity:1; }
.card-actions button{
  padding:4px 6px; border-radius:6px; color:var(--text-muted); line-height:1;
}
.card-actions button:hover{ background:var(--bg); color:var(--text); }
.card-actions button.act-danger:hover{ color:var(--danger); }
.card-actions svg{ width:14px; height:14px; stroke:currentColor; display:block; }

/* ============================================================
   空状態
   ============================================================ */
.empty{
  grid-column:1/-1;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  padding:80px 20px; text-align:center;
}
.empty h2{ font-size:16px; font-weight:600; }
.empty p{ font-size:13px; color:var(--text-muted); max-width:340px; }

/* ============================================================
   モーダル
   ============================================================ */
.overlay{
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:flex-start; justify-content:center;
  padding:6vh 16px 16px;
  background:rgba(24,24,27,.35);
  overflow-y:auto;
}
.overlay[hidden]{ display:none; }
.modal{
  width:100%; max-width:580px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow-lift);
  padding:20px 22px;
}
.modal-sm{ max-width:400px; margin-top:14vh; }
.modal h2{ font-size:15px; font-weight:600; margin-bottom:14px; }
.field{ margin-bottom:14px; }
.field-label{
  display:block; font-size:12px; font-weight:500; color:var(--text-muted);
  margin-bottom:5px;
}
#fTitle{
  width:100%; padding:9px 12px; font-size:16px; font-weight:600;
  border:1px solid var(--border); border-radius:8px; background:var(--surface);
}
#fBody{
  width:100%; min-height:110px; padding:9px 12px; font-size:14px; line-height:1.6;
  border:1px solid var(--border); border-radius:8px; background:var(--surface);
  resize:vertical;
}
.field-row{ display:flex; gap:14px; flex-wrap:wrap; }
.field-row .field{ flex:1; min-width:220px; }
.dt-wrap{ display:flex; align-items:center; gap:6px; }
.dt-wrap input[type="datetime-local"]{
  flex:1; padding:7px 9px; border:1px solid var(--border); border-radius:8px;
  background:var(--surface); font-size:13px; font-family:var(--mono);
}
.dt-clear{ padding:5px 8px; border-radius:6px; color:var(--text-muted); line-height:1; }
.dt-clear:hover{ background:var(--bg); color:var(--text); }

/* 色パレット */
.swatches{ display:flex; gap:8px; }
.swatch{
  width:26px; height:26px; border-radius:50%;
  border:1px solid var(--border);
  transition:transform .1s;
}
.swatch:hover{ transform:scale(1.12); }
.swatch.is-selected{ box-shadow:0 0 0 2px var(--surface), 0 0 0 4px var(--text); }
.swatch-none{
  background:var(--surface) !important; position:relative; overflow:hidden;
}
.swatch-none::after{
  content:""; position:absolute; left:-4px; top:50%; width:34px; height:1.5px;
  background:var(--text-muted); transform:rotate(-45deg);
}

/* タグ編集 */
.tagedit{
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:6px 8px; border:1px solid var(--border); border-radius:8px;
}
.tagedit .chip button{ padding:0 2px; color:inherit; line-height:1; font-size:13px; }
#fTagInput{ flex:1; min-width:120px; border:none; outline:none; padding:4px; font-size:13px; background:transparent; }

/* チェックリスト編集 */
.check-row{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.check-row input[type="checkbox"]{ width:16px; height:16px; accent-color:var(--text); flex:none; }
.check-row .check-text{
  flex:1; padding:6px 9px; border:1px solid var(--border); border-radius:7px; font-size:13px;
}
.check-row.is-done .check-text{ text-decoration:line-through; color:var(--text-muted); }
.check-row .rowbtn{
  padding:4px 7px; border-radius:6px; color:var(--text-muted); line-height:1; font-size:13px;
}
.check-row .rowbtn:hover:not(:disabled){ background:var(--bg); color:var(--text); }
.check-row .rowbtn:disabled{ opacity:.3; cursor:default; }
#fCheckAdd{
  width:100%; padding:7px 9px; border:1px dashed var(--border); border-radius:7px;
  font-size:13px; background:transparent;
}
#fCheckAdd:focus{ border-style:solid; }

.modal-foot{
  display:flex; align-items:center; gap:8px;
  margin-top:18px; padding-top:14px; border-top:1px solid var(--border);
}
.modal-foot .spacer{ flex:1; }
.editor-meta{ font-size:11px; color:var(--text-muted); font-family:var(--mono); }
.modal-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
#confirmMsg{ font-size:14px; white-space:pre-wrap; }

/* ダイジェスト */
.digest-list{ list-style:none; max-height:50vh; overflow-y:auto; }
.digest-item{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:10px 2px; border-bottom:1px solid var(--border);
}
.digest-info{ flex:1; min-width:180px; display:flex; flex-direction:column; }
.digest-info strong{ font-size:14px; font-weight:600; word-break:break-word; }
.digest-time{ font-size:12px; color:var(--text-muted); }
.digest-actions{ display:flex; gap:6px; }

/* ============================================================
   トースト
   ============================================================ */
.toasts{
  position:fixed; right:20px; bottom:20px; z-index:100;
  display:flex; flex-direction:column; gap:8px; max-width:360px;
}
.toast{
  display:flex; align-items:center; gap:10px;
  padding:11px 14px;
  background:var(--text); color:var(--bg);
  border-radius:10px; box-shadow:var(--shadow-lift);
  font-size:13px; animation:toast-in .18s ease-out;
}
.toast.is-danger{ background:var(--danger); color:#fff; }
.toast-msg{ flex:1; word-break:break-word; }
.toast-action{
  color:inherit; font-weight:700; text-decoration:underline; text-underline-offset:2px;
  white-space:nowrap;
}
.toast-close{ color:inherit; opacity:.7; line-height:1; padding:2px 4px; }
.toast-close:hover{ opacity:1; }
@keyframes toast-in{ from{ transform:translateY(8px); opacity:0 } to{ transform:none; opacity:1 } }

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation:none !important; transition:none !important; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">付箋</div>

  <div class="searchbox">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="searchInput" type="search" placeholder="検索（タイトル・本文・タグ）" aria-label="付箋を検索">
  </div>

  <select id="sortSelect" aria-label="並び順">
    <option value="updated">更新順</option>
    <option value="due">期限順</option>
    <option value="manual">手動</option>
  </select>

  <div class="topbar-spacer"></div>

  <button id="bellBtn" class="iconbtn" aria-label="未確認のリマインダー" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
    <span id="bellCount" class="badge">0</span>
  </button>

  <button id="syncStatus" class="sync" data-state="local" aria-live="polite">
    <span class="sync-dot" aria-hidden="true"></span><span id="syncText">…</span>
  </button>

  <button id="trashBtn" class="iconbtn" aria-pressed="false" aria-label="ゴミ箱を表示">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    <span id="trashCount"></span>
  </button>

  <div class="menuwrap">
    <button id="menuBtn" class="iconbtn" aria-label="メニュー" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
    </button>
    <div id="menuPop" class="menupop" hidden>
      <button id="exportBtn" type="button">JSON エクスポート</button>
      <button id="importBtn" type="button">JSON インポート</button>
      <div class="menu-hint">N: 新規　/: 検索　Esc: 閉じる<br>ドラッグ並び替えは「手動」ソート時</div>
    </div>
  </div>

  <button id="newBtn" class="btn btn-primary">＋ 新規作成</button>
</header>

<div id="tagbar" class="tagbar" role="group" aria-label="タグで絞り込み" hidden></div>

<div id="trashbar" class="trashbar" hidden>
  <strong>ゴミ箱</strong><span>削除済みの付箋。復元するか、完全に削除できます。</span>
  <span class="spacer"></span>
  <button id="emptyTrashBtn" class="btn sm btn-danger">ゴミ箱を空にする</button>
</div>

<main>
  <div id="grid" class="grid" role="list" aria-label="付箋一覧"></div>
  <div id="emptyBox" class="empty" hidden></div>
</main>

<!-- 編集モーダル -->
<div id="editorOverlay" class="overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editorHeading">
    <h2 id="editorHeading">付箋を編集</h2>

    <div class="field">
      <label class="field-label" for="fTitle">タイトル</label>
      <input id="fTitle" type="text" maxlength="200" placeholder="タイトル">
    </div>

    <div class="field">
      <label class="field-label" for="fBody">本文</label>
      <textarea id="fBody" maxlength="20000" placeholder="メモを入力…"></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <span class="field-label" id="colorLabel">色</span>
        <div id="fColors" class="swatches" role="group" aria-labelledby="colorLabel"></div>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="fTagInput">タグ（Enter で追加）</label>
      <div class="tagedit" id="fTags">
        <input id="fTagInput" type="text" maxlength="30" placeholder="タグを追加…">
      </div>
    </div>

    <div class="field">
      <span class="field-label">チェックリスト</span>
      <div id="fChecklist"></div>
      <input id="fCheckAdd" type="text" maxlength="500" placeholder="＋ 項目を追加（Enter）">
    </div>

    <div class="field-row">
      <div class="field">
        <label class="field-label" for="fDue">期限</label>
        <div class="dt-wrap">
          <input id="fDue" type="datetime-local" step="60">
          <button id="fDueClear" class="dt-clear" type="button" aria-label="期限をクリア">×</button>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="fReminder">リマインダー</label>
        <div class="dt-wrap">
          <input id="fReminder" type="datetime-local" step="60">
          <button id="fReminderClear" class="dt-clear" type="button" aria-label="リマインダーをクリア">×</button>
        </div>
      </div>
    </div>

    <div class="modal-foot">
      <button id="editorDelete" class="btn sm btn-danger" type="button">削除</button>
      <button id="editorDuplicate" class="btn sm" type="button">複製</button>
      <span class="editor-meta" id="editorMeta"></span>
      <span class="spacer"></span>
      <button id="editorCancel" class="btn" type="button">キャンセル</button>
      <button id="editorSave" class="btn btn-primary" type="button">保存</button>
    </div>
  </div>
</div>

<!-- 汎用確認ダイアログ -->
<div id="confirmOverlay" class="overlay" hidden>
  <div class="modal modal-sm" role="alertdialog" aria-modal="true" aria-describedby="confirmMsg">
    <p id="confirmMsg"></p>
    <div id="confirmActions" class="modal-actions"></div>
  </div>
</div>

<!-- 未確認リマインダーのダイジェスト -->
<div id="digestOverlay" class="overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="digestHeading">
    <h2 id="digestHeading">未確認のリマインダー</h2>
    <ul id="digestList" class="digest-list"></ul>
    <div class="modal-actions">
      <button id="digestAll" class="btn" type="button">すべて確認</button>
      <button id="digestClose" class="btn btn-primary" type="button">閉じる</button>
    </div>
  </div>
</div>

<div id="toasts" class="toasts" aria-live="polite"></div>
<input id="importFile" type="file" accept="application/json,.json" hidden>

<script>
'use strict';
/* ============================================================
   1. 設定 ★★★ ここを書き換える（2 箇所） ★★★
   ============================================================ */
const GAS_URL = ''; // ★ GAS のウェブアプリ URL（…/exec）を貼り付け
const TOKEN   = ''; // ★ Code.gs の TOKEN と同じ値を貼り付け
/* ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★ */

const CONFIG_OK = /^https:\/\/.+\/exec/.test(GAS_URL);

/* ============================================================
   2. 定数
   ============================================================ */
const LS = {
  notes: 'fusen.notes',
  rev:   'fusen.lastRev',
  queue: 'fusen.queue',
  sort:  'fusen.sort'
};
const COLORS = {
  none:   { label: '色なし',       value: '' },
  gray1:  { label: 'ライトグレー', value: '#E4E4E7' },
  gray2:  { label: 'グレー',       value: '#A1A1AA' },
  gray3:  { label: 'ダークグレー', value: '#52525B' },
  ink:    { label: 'ブラック',     value: '#18181B' },
  accent: { label: 'ネオン',       value: '#39FF14' }
};
const TITLE_MAX = 200;
const BODY_MAX = 20000;
const POLL_MS = 45000;          // ポーリング間隔（タブ可視時のみ）
const FLUSH_DEBOUNCE_MS = 1500; // 送信デバウンス
const REMINDER_TICK_MS = 20000; // リマインダー監視間隔
const STORAGE_WARN_CHARS = 2200000; // 約 4.4MB（UTF-16 で 2 バイト/文字）

/* ============================================================
   3. ユーティリティ
   ============================================================ */
const $ = id => document.getElementById(id);

// DOM 生成ヘルパ。ユーザー入力は textContent 経由でのみ挿入する（XSS 対策）
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v === false || v === null || v === undefined) continue;
    if (k === 'class') node.className = v;
    else if (k === 'text') node.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v === true ? '' : v);
  }
  for (const c of children.flat()) {
    if (c === null || c === undefined || c === false) continue;
    node.append(c.nodeType ? c : document.createTextNode(c));
  }
  return node;
}

function uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 3 | 8)).toString(16);
  });
}

const nowIso = () => new Date().toISOString();
const sleep = ms => new Promise(r => setTimeout(r, ms));
const pad2 = n => String(n).padStart(2, '0');

function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function fromLocalInput(v) {
  if (!v) return null;
  const d = new Date(v);
  return isNaN(d) ? null : d.toISOString();
}
function fmtDT(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return `${d.getMonth() + 1}/${d.getDate()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function relTime(iso) {
  const t = Date.parse(iso);
  if (!t) return '';
  const diff = Date.now() - t;
  if (diff < 60e3) return 'たった今';
  if (diff < 3600e3) return `${Math.floor(diff / 60e3)}分前`;
  if (diff < 86400e3) return `${Math.floor(diff / 3600e3)}時間前`;
  const d = new Date(t);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}
function isSameLocalDay(iso) {
  const d = new Date(iso), n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
}

function svgIcon(path) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke-width', '2');
  svg.setAttribute('aria-hidden', 'true');
  const p = document.createElementNS(ns, 'path');
  p.setAttribute('d', path);
  svg.append(p);
  return svg;
}
const ICON_PENCIL = 'M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z';
const ICON_COPY = 'M8 8h12v12H8Z M16 8V4H4v12h4';
const ICON_TRASH = 'M3 6h18M8 6V4h8v2m3 0-1 14H6L5 6';

/* ============================================================
   4. 状態
   ============================================================ */
const state = {
  notes: new Map(),      // id -> note
  queue: new Map(),      // id -> { attempts }  送信待ち
  lastRev: 0,            // 受信済み rev の最大値
  view: 'active',        // 'active' | 'trash'
  search: '',
  activeTags: new Set(),
  sort: 'updated',       // 'updated' | 'due' | 'manual'
  editingId: null,
  syncStatus: 'local'
};
let draft = null;           // エディタの作業コピー
let editorSnapshot = '';    // ダーティ判定用
let lastFocused = null;     // モーダル閉鎖時のフォーカス復帰先
let suppressClick = false;  // ドラッグ直後のクリック抑止
let pendingRender = false;  // ドラッグ中に保留した再描画
const firedReminders = new Set(); // セッション内で発火済みの id@reminderAt

/* ============================================================
   5. 正規化・永続化
   ============================================================ */
function normalizeNote(n) {
  if (!n || typeof n.id !== 'string' || !n.id) return null;
  return {
    id: n.id,
    title: typeof n.title === 'string' ? n.title.slice(0, TITLE_MAX) : '',
    body: typeof n.body === 'string' ? n.body.slice(0, BODY_MAX) : '',
    color: COLORS[n.color] ? n.color : 'none',
    tags: Array.isArray(n.tags)
      ? n.tags.filter(t => typeof t === 'string' && t).map(t => t.slice(0, 30)).slice(0, 20)
      : [],
    checklist: Array.isArray(n.checklist)
      ? n.checklist.filter(i => i && typeof i.text === 'string').map(i => ({
          id: typeof i.id === 'string' && i.id ? i.id : uuid(),
          text: i.text.slice(0, 500),
          done: !!i.done
        })).slice(0, 100)
      : [],
    dueAt: typeof n.dueAt === 'string' && n.dueAt ? n.dueAt : null,
    reminderAt: typeof n.reminderAt === 'string' && n.reminderAt ? n.reminderAt : null,
    order: Number.isFinite(Number(n.order)) ? Number(n.order) : 0,
    createdAt: typeof n.createdAt === 'string' && n.createdAt ? n.createdAt : nowIso(),
    updatedAt: typeof n.updatedAt === 'string' && n.updatedAt ? n.updatedAt : nowIso(),
    rev: Number(n.rev) || 0,
    deleted: n.deleted === true || n.deleted === 'true'
  };
}

// 同期照合用の内容シグネチャ（rev / updatedAt は含めない）
function signature(n) {
  return JSON.stringify({
    t: n.title, b: n.body, c: n.color, g: n.tags,
    k: (n.checklist || []).map(i => [i.id, i.text, !!i.done]),
    d: n.dueAt || null, r: n.reminderAt || null,
    o: Number(n.order) || 0, x: !!n.deleted
  });
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS.notes);
    if (raw) {
      for (const n of JSON.parse(raw)) {
        const m = normalizeNote(n);
        if (m) state.notes.set(m.id, m);
      }
    }
    state.lastRev = Number(localStorage.getItem(LS.rev)) || 0;
    const q = localStorage.getItem(LS.queue);
    if (q) {
      for (const id of JSON.parse(q)) {
        if (state.notes.has(id)) state.queue.set(id, { attempts: 0 });
      }
    }
    const sort = localStorage.getItem(LS.sort);
    if (['updated', 'due', 'manual'].includes(sort)) state.sort = sort;
  } catch (err) {
    console.warn('ローカルデータの読み込みに失敗:', err);
  }
}

let storageWarned = false;
function persistLocal() {
  try {
    const json = JSON.stringify([...state.notes.values()]);
    localStorage.setItem(LS.notes, json);
    localStorage.setItem(LS.rev, String(state.lastRev));
    localStorage.setItem(LS.queue, JSON.stringify([...state.queue.keys()]));
    if (json.length > STORAGE_WARN_CHARS && !storageWarned) {
      storageWarned = true;
      toast('ローカル保存容量が上限（約5MB）に近づいています。不要な付箋を削除するか、JSON エクスポートで退避してください', { kind: 'danger', duration: 10000 });
    }
  } catch (err) {
    toast('ローカル保存に失敗しました。ブラウザの保存容量を確認してください', { kind: 'danger' });
  }
}

/* ============================================================
   6. 同期エンジン
   ============================================================ */
let jsonpSeq = 0;
function jsonp(params, timeoutMs = 15000) {
  return new Promise((resolve, reject) => {
    const cb = '__fusenCb' + (++jsonpSeq);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeoutMs);
    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      script.remove();
    }
    window[cb] = data => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    const qs = new URLSearchParams(Object.assign({}, params, { token: TOKEN, callback: cb }));
    script.src = GAS_URL + '?' + qs.toString();
    document.head.appendChild(script);
  });
}

// no-cors のためレスポンスは opaque（読めない）。成否は直後の JSONP で照合する。
// text/plain は単純リクエスト扱いになり、GAS が処理できない OPTIONS を発生させない。
async function postJson(payload) {
  await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(Object.assign({ token: TOKEN }, payload))
  });
}

function setSync(status) {
  state.syncStatus = status;
  const box = $('syncStatus');
  const label = {
    local: '未接続（ローカルのみ）',
    idle: '待機中',
    syncing: '同期中…',
    ok: '同期済み ✓',
    offline: 'オフライン',
    error: '同期エラー（再試行）'
  }[status] || status;
  box.dataset.state = status === 'idle' ? 'ok' : status;
  $('syncText').textContent = label;
  box.title = status === 'error' ? 'クリックで再試行します。オフラインの変更は保持されています'
    : status === 'offline' ? '変更はローカルに保持され、復帰時に自動送信されます'
    : status === 'local' ? 'index.html の GAS_URL / TOKEN を設定するとデバイス間で同期できます'
    : '';
}

// サーバー差分をローカルへマージ。送信キューにある id はスキップする
// （自分の push が後でより大きい rev を取り LWW で勝つため）。
// deleted:true の tombstone も rev 比較で通常レコードと同様に適用される。
function mergeServer(rawList) {
  let changed = false;
  for (const raw of rawList || []) {
    const sn = normalizeNote(raw);
    if (!sn) continue;
    if (sn.rev > state.lastRev) state.lastRev = sn.rev;
    if (state.queue.has(sn.id)) continue;
    const ln = state.notes.get(sn.id);
    if (!ln || sn.rev > (ln.rev || 0)) {
      state.notes.set(sn.id, sn);
      changed = true;
    }
  }
  return changed;
}

let pulling = false;
async function pull() {
  if (!CONFIG_OK || !navigator.onLine || pulling) return;
  pulling = true;
  try {
    if (state.queue.size === 0) setSync('syncing');
    const resp = await jsonp({ action: 'list', since: state.lastRev });
    if (!resp || !resp.ok) throw new Error((resp && resp.error) || 'list_failed');
    if (mergeServer(resp.notes)) {
      persistLocal();
      render();
      checkReminders();
    }
    if (state.queue.size === 0) setSync('ok');
  } catch (err) {
    if (String(err.message || err).includes('unauthorized')) {
      toast('トークンが一致しません。index.html と Code.gs の TOKEN を確認してください', { kind: 'danger', duration: 8000 });
    }
    if (state.queue.size === 0) setSync('error');
  } finally {
    pulling = false;
  }
}

function enqueueDirty(note) {
  note.updatedAt = nowIso(); // 暫定値。サーバー確定後に上書きされる
  state.notes.set(note.id, note);
  const q = state.queue.get(note.id);
  if (q) q.attempts = 0;
  else state.queue.set(note.id, { attempts: 0 });
}
function commitDirty() {
  persistLocal();
  if (CONFIG_OK) {
    if (navigator.onLine) { setSync('syncing'); scheduleFlush(); }
    else setSync('offline');
  }
  render();
  updateBell();
}
function markDirty(note) {
  enqueueDirty(note);
  commitDirty();
}

let flushTimer = null;
let flushing = false;
function scheduleFlush(delay = FLUSH_DEBOUNCE_MS) {
  clearTimeout(flushTimer);
  flushTimer = setTimeout(flush, delay);
}

async function flush() {
  clearTimeout(flushTimer);
  flushTimer = null;
  if (!CONFIG_OK || state.queue.size === 0) return;
  if (!navigator.onLine) { setSync('offline'); return; }
  if (flushing) { scheduleFlush(1000); return; }

  flushing = true;
  setSync('syncing');
  const sinceBase = state.lastRev; // POST 前に控える（差分取りこぼし防止）
  const sigs = new Map();
  const payload = [];
  for (const id of [...state.queue.keys()]) {
    const n = state.notes.get(id);
    if (!n) { state.queue.delete(id); continue; }
    payload.push(n);
    sigs.set(id, signature(n));
  }

  try {
    if (payload.length) {
      await postJson({ action: 'upsert', notes: payload });
      await sleep(1800); // GAS 側の書き込み完了を待つ
      const resp = await jsonp({ action: 'list', since: sinceBase });
      if (!resp || !resp.ok) throw new Error((resp && resp.error) || 'verify_failed');

      const server = new Map();
      for (const raw of resp.notes || []) {
        const sn = normalizeNote(raw);
        if (sn) server.set(sn.id, sn);
      }
      // 送信分の照合: サーバー版のシグネチャが送信時と一致すれば着地確定
      for (const [id, sig] of sigs) {
        const q = state.queue.get(id);
        if (!q) continue;
        const local = state.notes.get(id);
        const sn = server.get(id);
        if (!local) { state.queue.delete(id); continue; }
        if (sn && signature(sn) === sig) {
          if (signature(local) === sig) {
            local.rev = sn.rev;
            local.updatedAt = sn.updatedAt;
            local.createdAt = sn.createdAt || local.createdAt;
            state.queue.delete(id);
          }
          // 送信後にさらに編集されていればキューに残して再送
        } else if (sn) {
          // 別デバイスが後から書いた等。2 回試して合わなければ LWW でサーバー優先
          q.attempts++;
          if (q.attempts >= 2) {
            state.notes.set(id, sn);
            state.queue.delete(id);
          }
        } else {
          q.attempts++; // まだ反映が見えない → 再送
        }
      }
      mergeServer(resp.notes); // 他レコードの差分も取り込む
    }
    persistLocal();
    render();
    updateBell();

    if (state.queue.size > 0) {
      const stuck = [...state.queue.values()].some(q => q.attempts >= 4);
      setSync(stuck ? 'error' : 'syncing');
      scheduleFlush(stuck ? 15000 : 5000);
    } else {
      setSync('ok');
    }
  } catch (err) {
    for (const q of state.queue.values()) q.attempts++;
    setSync(navigator.onLine ? 'error' : 'offline');
    scheduleFlush(15000);
  } finally {
    flushing = false;
  }
}

function startPolling() {
  setInterval(() => {
    if (document.visibilityState === 'visible' && navigator.onLine && !flushing) pull();
  }, POLL_MS);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { pull(); checkReminders(); }
  });
}

window.addEventListener('online', () => {
  if (!CONFIG_OK) return;
  setSync('syncing');
  flush();
  pull();
});
window.addEventListener('offline', () => { if (CONFIG_OK) setSync('offline'); });

/* ============================================================
   7. 一覧描画
   ============================================================ */
function activeNotes() {
  return [...state.notes.values()].filter(n => !n.deleted);
}
function trashedNotes() {
  return [...state.notes.values()].filter(n => n.deleted);
}
function minOrder() {
  let m = 0;
  for (const n of state.notes.values()) if (n.order < m) m = n.order;
  return m;
}

function compareNotes(a, b) {
  if (state.sort === 'manual') {
    return (a.order - b.order) || (b.createdAt || '').localeCompare(a.createdAt || '');
  }
  if (state.sort === 'due') {
    const ad = a.dueAt ? Date.parse(a.dueAt) : Infinity;
    const bd = b.dueAt ? Date.parse(b.dueAt) : Infinity;
    if (ad !== bd) return ad - bd;
  }
  return (b.updatedAt || '').localeCompare(a.updatedAt || '');
}

function visibleNotes() {
  if (state.view === 'trash') {
    return trashedNotes().sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
  }
  let list = activeNotes();
  if (state.activeTags.size) {
    list = list.filter(n => [...state.activeTags].every(t => n.tags.includes(t)));
  }
  if (state.search) {
    const q = state.search;
    list = list.filter(n =>
      n.title.toLowerCase().includes(q) ||
      n.body.toLowerCase().includes(q) ||
      n.tags.some(t => t.toLowerCase().includes(q)) ||
      n.checklist.some(i => i.text.toLowerCase().includes(q))
    );
  }
  return list.sort(compareNotes);
}

function dueInfo(note) {
  if (!note.dueAt) return null;
  const t = Date.parse(note.dueAt);
  if (!t) return null;
  return { over: t < Date.now(), today: isSameLocalDay(note.dueAt) };
}

function buildCard(note) {
  const isTrash = state.view === 'trash';
  const card = el('article', {
    class: 'card' + (isTrash ? ' is-trash' : '') + (state.editingId === note.id ? ' is-active' : ''),
    role: 'listitem', tabindex: '0',
    'data-id': note.id,
    'aria-label': note.title || '無題の付箋'
  });

  const color = COLORS[note.color];
  if (color && color.value) {
    const strip = el('span', { class: 'card-strip', 'aria-hidden': 'true' });
    strip.style.background = color.value;
    card.append(strip);
  }

  card.append(el('h3', {
    class: 'card-title' + (note.title ? '' : ' is-untitled'),
    text: note.title || '無題'
  }));

  if (note.body) card.append(el('div', { class: 'card-body', text: note.body }));

  const meta = [];
  const due = dueInfo(note);
  if (due) {
    meta.push(el('span', { class: 'due' + (due.over ? ' is-over' : '') },
      due.today && !due.over ? el('span', { class: 'due-dot', 'aria-hidden': 'true' }) : null,
      `期限 ${fmtDT(note.dueAt)}` + (due.over ? '（超過）' : '')
    ));
  }
  if (note.checklist.length) {
    const done = note.checklist.filter(i => i.done).length;
    meta.push(el('span', { class: 'progress', text: `☑ ${done}/${note.checklist.length}` }));
  }
  if (note.reminderAt) {
    meta.push(el('span', { class: 'due', text: `🔔 ${fmtDT(note.reminderAt)}` }));
  }
  if (meta.length) card.append(el('div', { class: 'card-meta' }, meta));

  if (note.tags.length) {
    const shown = note.tags.slice(0, 4).map(t => el('span', { class: 'mini', text: t }));
    if (note.tags.length > 4) shown.push(el('span', { class: 'mini', text: `+${note.tags.length - 4}` }));
    card.append(el('div', { class: 'tagchips' }, shown));
  }

  const actions = isTrash
    ? [
        el('button', { class: 'btn sm', type: 'button', 'data-action': 'restore' }, '復元'),
        el('button', { class: 'btn sm btn-danger', type: 'button', 'data-action': 'purge' }, '完全に削除')
      ]
    : [
        el('button', { type: 'button', 'data-action': 'edit', 'aria-label': '編集' }, svgIcon(ICON_PENCIL)),
        el('button', { type: 'button', 'data-action': 'duplicate', 'aria-label': '複製' }, svgIcon(ICON_COPY)),
        el('button', { type: 'button', class: 'act-danger', 'data-action': 'delete', 'aria-label': '削除' }, svgIcon(ICON_TRASH))
      ];
  card.append(el('div', { class: 'card-foot' },
    el('span', { class: 'card-time', text: relTime(note.updatedAt) }),
    el('div', { class: 'card-actions' }, actions)
  ));
  return card;
}

let renderToken = 0;
function render() {
  if (dragCtx && dragCtx.active) { pendingRender = true; return; }
  const list = visibleNotes();
  renderTagbar();
  updateHeaderUI();
  renderEmpty(list);

  const grid = $('grid');
  const token = ++renderToken;
  grid.textContent = '';
  let i = 0;
  const CHUNK = 80; // 件数が多くても操作をブロックしないよう分割描画
  (function step() {
    if (token !== renderToken) return;
    const frag = document.createDocumentFragment();
    for (let c = 0; c < CHUNK && i < list.length; c++, i++) frag.append(buildCard(list[i]));
    grid.append(frag);
    if (i < list.length) requestAnimationFrame(step);
  })();
}

function renderEmpty(list) {
  const box = $('emptyBox');
  if (list.length) { box.hidden = true; return; }
  box.hidden = false;
  box.textContent = '';
  if (state.view === 'trash') {
    box.append(el('h2', { text: 'ゴミ箱は空です' }),
      el('p', { text: '削除した付箋はここに移動し、復元できます。' }));
  } else if (activeNotes().length === 0) {
    box.append(
      el('h2', { text: 'まだ付箋がありません' }),
      el('p', { text: '思いついたことを書き留めましょう。タグ・チェックリスト・期限・リマインダーが使えます。' }),
      el('button', { class: 'btn btn-primary', type: 'button', onclick: () => openEditor(null) }, '＋ 最初の付箋を作成')
    );
  } else {
    box.append(
      el('h2', { text: '条件に一致する付箋がありません' }),
      el('p', { text: '検索語やタグの絞り込みを見直してください。' }),
      el('button', {
        class: 'btn', type: 'button',
        onclick: () => {
          state.search = '';
          $('searchInput').value = '';
          state.activeTags.clear();
          render();
        }
      }, '条件をクリア')
    );
  }
}

function renderTagbar() {
  const bar = $('tagbar');
  if (state.view === 'trash') { bar.hidden = true; return; }
  const counts = new Map();
  for (const n of activeNotes()) for (const t of n.tags) counts.set(t, (counts.get(t) || 0) + 1);
  // 付箋から消えたタグが選択に残らないよう掃除
  for (const t of [...state.activeTags]) if (!counts.has(t)) state.activeTags.delete(t);
  if (counts.size === 0) { bar.hidden = true; return; }
  bar.hidden = false;
  bar.textContent = '';
  if (state.activeTags.size) {
    bar.append(el('button', {
      class: 'chip', type: 'button',
      onclick: () => { state.activeTags.clear(); render(); }
    }, 'すべて表示'));
  }
  const tags = [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'ja'));
  for (const [tag, count] of tags) {
    const selected = state.activeTags.has(tag);
    bar.append(el('button', {
      class: 'chip' + (selected ? ' is-selected' : ''),
      type: 'button', 'aria-pressed': selected ? 'true' : 'false',
      onclick: () => {
        if (selected) state.activeTags.delete(tag); else state.activeTags.add(tag);
        render();
      }
    }, tag, el('span', { class: 'chip-count', text: String(count) })));
  }
}

function updateHeaderUI() {
  const trashCount = trashedNotes().length;
  $('trashCount').textContent = trashCount ? `(${trashCount})` : '';
  $('trashBtn').setAttribute('aria-pressed', state.view === 'trash' ? 'true' : 'false');

/* ============================================================
   8. カード操作（イベント委譲）
   ============================================================ */
$('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const note = state.notes.get(card.dataset.id);
  if (!note) return;
  const btn = e.target.closest('[data-action]');
  if (btn) { handleCardAction(btn.dataset.action, note); return; }
  if (suppressClick) { suppressClick = false; return; }
  if (state.view === 'active') openEditor(note);
});

$('grid').addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const card = e.target.closest('.card');
  if (!card || e.target !== card) return;
  e.preventDefault();
  const note = state.notes.get(card.dataset.id);
  if (note && state.view === 'active') openEditor(note);
});

function handleCardAction(action, note) {
  if (action === 'edit') openEditor(note);
  else if (action === 'duplicate') duplicateNote(note);
  else if (action === 'delete') requestDelete(note);
  else if (action === 'restore') { note.deleted = false; markDirty(note); toast('付箋を復元しました'); }
  else if (action === 'purge') purgeNotes([note.id], 'この付箋を完全に削除しますか？この操作は取り消せません。');
}

function duplicateNote(src) {
  const copy = normalizeNote(JSON.parse(JSON.stringify(src)));
  copy.id = uuid();
  copy.title = src.title ? `${src.title} のコピー` : '';
  copy.checklist = copy.checklist.map(i => ({ ...i, id: uuid() }));
  copy.createdAt = nowIso();
  copy.rev = 0;
  copy.order = minOrder() - 1;
  copy.deleted = false;
  markDirty(copy);
  toast('付箋を複製しました');
}

async function requestDelete(note) {
  const label = note.title ? `「${note.title}」` : 'この付箋';
  const ok = await confirmDialog(`${label}を削除しますか？\nゴミ箱から復元できます。`, { okLabel: '削除', danger: true });
  if (!ok) return;
  if (state.editingId === note.id) closeEditor(true);
  note.deleted = true;
  markDirty(note);
  toast('付箋を削除しました', {
    action: '元に戻す',
    onAction: () => { note.deleted = false; markDirty(note); }
  });
}

async function purgeNotes(ids, message) {
  const ok = await confirmDialog(message, { okLabel: '完全に削除', danger: true });
  if (!ok) return;
  for (const id of ids) {
    state.notes.delete(id);
    state.queue.delete(id);
  }
  persistLocal();
  render();
  if (CONFIG_OK && navigator.onLine) {
    try { await postJson({ action: 'purge', ids }); } catch (ignore) {}
  }
  toast(`${ids.length} 件を完全に削除しました`);
}

$('emptyTrashBtn').addEventListener('click', () => {
  const ids = trashedNotes().map(n => n.id);
  if (ids.length) purgeNotes(ids, `ゴミ箱の ${ids.length} 件をすべて完全に削除しますか？この操作は取り消せません。`);
});

/* ============================================================
   9. エディタ
   ============================================================ */
function openEditor(note) {
  lastFocused = document.activeElement;
  draft = note
    ? normalizeNote(JSON.parse(JSON.stringify(note)))
    : { id: '', title: '', body: '', color: 'none', tags: [], checklist: [],
        dueAt: null, reminderAt: null, order: 0, createdAt: '', updatedAt: '', rev: 0, deleted: false };
  state.editingId = note ? note.id : null;

  $('editorHeading').textContent = note ? '付箋を編集' : '新しい付箋';
  $('fTitle').value = draft.title;
  $('fBody').value = draft.body;
  $('fDue').value = toLocalInput(draft.dueAt);
  $('fReminder').value = toLocalInput(draft.reminderAt);
  $('fTagInput').value = '';
  $('fCheckAdd').value = '';
  $('editorDelete').hidden = !note;
  $('editorDuplicate').hidden = !note;
  $('editorMeta').textContent = note ? `更新 ${fmtDT(note.updatedAt)}` : '';
  renderColorPicker();
  renderTagChips();
  renderChecklistEditor();

  $('editorOverlay').hidden = false;
  document.body.classList.add('modal-open');
  editorSnapshot = editorSig();
  $('fTitle').focus();
  render(); // 編集中カードに accent 枠を付ける
}

function editorSig() {
  return JSON.stringify([
    $('fTitle').value, $('fBody').value, draft.color, draft.tags,
    draft.checklist.map(i => [i.text, i.done]),
    $('fDue').value, $('fReminder').value
  ]);
}

async function closeEditor(force) {
  if ($('editorOverlay').hidden) return;
  if (!force && editorSig() !== editorSnapshot) {
    const ok = await confirmDialog('変更を保存せずに閉じますか？', { okLabel: '破棄する', danger: true });
    if (!ok) return;
  }
  $('editorOverlay').hidden = true;
  document.body.classList.remove('modal-open');
  state.editingId = null;
  draft = null;
  render();
  if (lastFocused && lastFocused.isConnected) lastFocused.focus();
}

function saveEditor() {
  if (!draft) return;
  const title = $('fTitle').value.trim();
  const body = $('fBody').value;
  draft.checklist = draft.checklist.filter(i => i.text.trim());
  if (!title && !body.trim() && draft.checklist.length === 0) {
    toast('タイトル・本文・チェックリストのいずれかを入力してください', { kind: 'danger' });
    return;
  }
  draft.title = title.slice(0, TITLE_MAX);
  draft.body = body.slice(0, BODY_MAX);
  draft.dueAt = fromLocalInput($('fDue').value);
  draft.reminderAt = fromLocalInput($('fReminder').value);

  let target;
  if (state.editingId && state.notes.has(state.editingId)) {
    target = state.notes.get(state.editingId);
    Object.assign(target, {
      title: draft.title, body: draft.body, color: draft.color,
      tags: draft.tags, checklist: draft.checklist,
      dueAt: draft.dueAt, reminderAt: draft.reminderAt
    });
  } else {
    draft.id = uuid();
    draft.createdAt = nowIso();
    draft.order = minOrder() - 1;
    target = draft;
  }

  if (target.reminderAt && 'Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  closeEditorImmediate();
  markDirty(target);
}

function closeEditorImmediate() {
  $('editorOverlay').hidden = true;
  document.body.classList.remove('modal-open');
  state.editingId = null;
  draft = null;
  if (lastFocused && lastFocused.isConnected) lastFocused.focus();
}

function renderColorPicker() {
  const box = $('fColors');
  box.textContent = '';
  for (const [key, c] of Object.entries(COLORS)) {
    const btn = el('button', {
      type: 'button',
      class: 'swatch' + (key === 'none' ? ' swatch-none' : '') + (draft.color === key ? ' is-selected' : ''),
      title: c.label, 'aria-label': c.label,
      'aria-pressed': draft.color === key ? 'true' : 'false',
      onclick: () => { draft.color = key; renderColorPicker(); }
    });
    if (c.value) btn.style.background = c.value;
    box.append(btn);
  }
}

function renderTagChips() {
  const box = $('fTags');
  for (const chip of [...box.querySelectorAll('.chip')]) chip.remove();
  const input = $('fTagInput');
  for (const tag of draft.tags) {
    box.insertBefore(
      el('span', { class: 'chip' }, tag,
        el('button', { type: 'button', 'aria-label': `タグ「${tag}」を削除`,
          onclick: () => { draft.tags = draft.tags.filter(t => t !== tag); renderTagChips(); } }, '×')),
      input
    );
  }
}

function addTagFromInput() {
  const input = $('fTagInput');
  const v = input.value.trim().replace(/,/g, '');
  if (!v) return;
  if (!draft.tags.includes(v) && draft.tags.length < 20) {
    draft.tags.push(v);
    renderTagChips();
  }
  input.value = '';
}

$('fTagInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTagFromInput();
  } else if (e.key === 'Backspace' && !e.target.value && draft.tags.length) {
    draft.tags.pop();
    renderTagChips();
  }
});
$('fTagInput').addEventListener('blur', addTagFromInput);

function renderChecklistEditor() {
  const box = $('fChecklist');
  box.textContent = '';
  draft.checklist.forEach((item, idx) => {
    const row = el('div', { class: 'check-row' + (item.done ? ' is-done' : '') },
      el('input', {
        type: 'checkbox', checked: item.done, 'aria-label': '完了',
        onchange: e => { item.done = e.target.checked; renderChecklistEditor(); }
      }),
      el('input', {
        type: 'text', class: 'check-text', value: item.text, maxlength: '500',
        'aria-label': 'チェック項目',
        oninput: e => { item.text = e.target.value; }
      }),
      el('button', {
        type: 'button', class: 'rowbtn', 'aria-label': '上へ移動', disabled: idx === 0,
        onclick: () => { swapChecklist(idx, idx - 1); }
      }, '↑'),
      el('button', {
        type: 'button', class: 'rowbtn', 'aria-label': '下へ移動', disabled: idx === draft.checklist.length - 1,
        onclick: () => { swapChecklist(idx, idx + 1); }
      }, '↓'),
      el('button', {
        type: 'button', class: 'rowbtn', 'aria-label': '項目を削除',
        onclick: () => { draft.checklist.splice(idx, 1); renderChecklistEditor(); }
      }, '×')
    );
    box.append(row);
  });
}
function swapChecklist(a, b) {
  const list = draft.checklist;
  [list[a], list[b]] = [list[b], list[a]];
  renderChecklistEditor();
}

$('fCheckAdd').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const v = e.target.value.trim();
  if (!v || draft.checklist.length >= 100) return;
  draft.checklist.push({ id: uuid(), text: v.slice(0, 500), done: false });
  e.target.value = '';
  renderChecklistEditor();
});

});

});

/* ============================================================
   10. ドラッグ並び替え（Pointer Events）
   ============================================================ */
let dragCtx = null;
let manualHintShown = false;

$('grid').addEventListener('pointerdown', e => {
  if (e.button !== 0 || state.view !== 'active') return;
  const card = e.target.closest('.card');
  if (!card || e.target.closest('button, input, a, select, textarea')) return;
  dragCtx = { card, id: card.dataset.id, startX: e.clientX, startY: e.clientY, active: false };
  window.addEventListener('pointermove', onDragMove);
  window.addEventListener('pointerup', onDragEnd);
  window.addEventListener('pointercancel', onDragEnd);
});

function onDragMove(e) {
  if (!dragCtx) return;
  if (!dragCtx.active) {
    if (Math.hypot(e.clientX - dragCtx.startX, e.clientY - dragCtx.startY) < 8) return;
    if (state.sort !== 'manual') {
      if (!manualHintShown) {
        manualHintShown = true;
        toast('ドラッグ並び替えは並び順「手動」のときに使えます');
      }
      cleanupDrag();
      return;
    }
    dragCtx.active = true;
    dragCtx.card.classList.add('dragging');
    document.body.classList.add('is-dragging');
  }
  e.preventDefault();
  const over = document.elementFromPoint(e.clientX, e.clientY);
  const target = over && over.closest('.card:not(.dragging)');
  if (!target || target.parentElement !== $('grid')) return;
  const rect = target.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2 ||
    (e.clientY < rect.bottom && e.clientX < rect.left + rect.width / 2);
  if (before) $('grid').insertBefore(dragCtx.card, target);
  else $('grid').insertBefore(dragCtx.card, target.nextSibling);
}

function onDragEnd() {
  if (!dragCtx) return;
  const wasActive = dragCtx.active;
  const cardEl = dragCtx.card;
  const noteId = dragCtx.id;
  cleanupDrag();
  if (!wasActive) return;
  suppressClick = true;
  setTimeout(() => { suppressClick = false; }, 100);

  const cards = [...$('grid').querySelectorAll('.card')];
  const idx = cards.indexOf(cardEl);
  const note = state.notes.get(noteId);
  if (!note || idx < 0) { render(); return; }
  const prev = idx > 0 ? state.notes.get(cards[idx - 1].dataset.id) : null;
  const next = idx < cards.length - 1 ? state.notes.get(cards[idx + 1].dataset.id) : null;
  const ord = computeOrderBetween(prev, next);
  if (ord === null) {
    // 浮動小数の精度が尽きた → 表示順で全体を振り直す
    cards.forEach((c, i) => {
      const n = state.notes.get(c.dataset.id);
      if (n && n.order !== i) enqueueDirty(Object.assign(n, { order: i }));
    });
    commitDirty();
  } else {
    note.order = ord;
    markDirty(note);
  }
}

function cleanupDrag() {
  if (dragCtx) {
    dragCtx.card.classList.remove('dragging');
    dragCtx = null;
  }
  document.body.classList.remove('is-dragging');
  window.removeEventListener('pointermove', onDragMove);
  window.removeEventListener('pointerup', onDragEnd);
  window.removeEventListener('pointercancel', onDragEnd);
  if (pendingRender) { pendingRender = false; render(); }
}

function computeOrderBetween(prev, next) {
  const lo = prev ? prev.order : null;
  const hi = next ? next.order : null;
  if (lo === null && hi === null) return 0;
  if (lo === null) return hi - 1;
  if (hi === null) return lo + 1;
  const mid = (lo + hi) / 2;
  return (mid > lo && mid < hi) ? mid : null;
}

/* ============================================================
   11. リマインダー
   ============================================================ */
function pendingReminders() {
  const now = Date.now();
  return [...state.notes.values()]
    .filter(n => !n.deleted && n.reminderAt && Date.parse(n.reminderAt) <= now)
    .sort((a, b) => (a.reminderAt || '').localeCompare(b.reminderAt || ''));
}

function checkReminders() {
  for (const n of pendingReminders()) {
    const key = `${n.id}@${n.reminderAt}`;
    if (firedReminders.has(key)) continue;
    firedReminders.add(key);
    fireReminder(n);
  }
  updateBell();
}

function fireReminder(note) {
  const title = note.title || '無題の付箋';
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      const notif = new Notification('リマインダー: ' + title, {
        body: note.body ? note.body.slice(0, 120) : fmtDT(note.reminderAt),
        tag: note.id
      });
      notif.onclick = () => { window.focus(); openEditor(note); notif.close(); };
    } catch (ignore) {}
  }
  toast(`🔔 ${title}`, {
    duration: 20000,
    action: '10分後に再通知',
    onAction: () => snoozeReminder(note, 10),
    secondAction: '確認',
    onSecondAction: () => ackReminder(note)
  });
}

function snoozeReminder(note, minutes) {
  note.reminderAt = new Date(Date.now() + minutes * 60000).toISOString();
  markDirty(note);
}
function ackReminder(note) {
  note.reminderAt = null;
  markDirty(note);
}

function updateBell() {
  const count = pendingReminders().length;
  $('bellBtn').hidden = count === 0;
  $('bellCount').textContent = String(count);
}

function showDigest() {
  const list = pendingReminders();
  if (!list.length) { $('digestOverlay').hidden = true; return; }
  const ul = $('digestList');
  ul.textContent = '';
  for (const n of list) {
    ul.append(el('li', { class: 'digest-item' },
      el('div', { class: 'digest-info' },
        el('strong', { text: n.title || '無題' }),
        el('span', { class: 'digest-time mono', text: `通知予定 ${fmtDT(n.reminderAt)}` })),
      el('div', { class: 'digest-actions' },
        el('button', { class: 'btn sm', type: 'button', onclick: () => { snoozeReminder(n, 10); refreshDigest(); } }, '10分後'),
        el('button', { class: 'btn sm', type: 'button', onclick: () => { snoozeReminder(n, 60); refreshDigest(); } }, '1時間後'),
        el('button', { class: 'btn sm', type: 'button', onclick: () => { ackReminder(n); refreshDigest(); } }, '確認'))
    ));
  }
  $('digestOverlay').hidden = false;
  document.body.classList.add('modal-open');
  $('digestClose').focus();
}
function refreshDigest() {
  updateBell();
  if (pendingReminders().length === 0) closeDigest();
  else showDigest();
}
function closeDigest() {
  $('digestOverlay').hidden = true;
  document.body.classList.remove('modal-open');
}

$('bellBtn').addEventListener('click', showDigest);
$('digestClose').addEventListener('click', closeDigest);
$('digestAll').addEventListener('click', () => {
  for (const n of pendingReminders()) { n.reminderAt = null; enqueueDirty(n); }
  commitDirty();
  closeDigest();
});
$('digestOverlay').addEventListener('click', e => {
  if (e.target === $('digestOverlay')) closeDigest();
});

// 起動時: 閉じている間に過ぎたリマインダーをダイジェストとして提示
function startupDigest() {
  const missed = pendingReminders();
  for (const n of missed) firedReminders.add(`${n.id}@${n.reminderAt}`); // トースト連発を防ぐ
  updateBell();
  if (missed.length) showDigest();
  setInterval(checkReminders, REMINDER_TICK_MS);
}

  document.body.append(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
  toast(`${data.notes.length} 件をエクスポートしました`);
});

$('importBtn').addEventListener('click', () => {
  closeMenu();
  $('importFile').click();
});

$('importFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  let list;
  try {
    const obj = JSON.parse(await file.text());
    const raw = Array.isArray(obj) ? obj : obj.notes;
    if (!Array.isArray(raw)) throw new Error('notes 配列がありません');
    list = raw.map(normalizeNote).filter(Boolean);
    if (!list.length) throw new Error('有効な付箋がありません');
  } catch (err) {
    toast('インポートできません。JSON の形式を確認してください', { kind: 'danger' });
    return;
  }
  const mode = await choiceDialog(
    `${list.length} 件の付箋が見つかりました。取り込み方法を選択してください。\n「置き換え」は現在のすべての付箋を破棄します。`,
    [
      { label: 'キャンセル', value: null },
      { label: 'すべて置き換え', value: 'replace', kind: 'danger' },
      { label: 'マージ（新しい方を残す）', value: 'merge', kind: 'primary' }
    ]
  );
  if (!mode) return;
  let applied = 0;
  if (mode === 'replace') {
    state.notes.clear();
    state.queue.clear();
    for (const n of list) {
      state.notes.set(n.id, n);
      state.queue.set(n.id, { attempts: 0 });
      applied++;
    }
  } else {
    for (const n of list) {
      const local = state.notes.get(n.id);
      if (!local || n.rev > local.rev ||
          (n.rev === local.rev && (n.updatedAt || '') > (local.updatedAt || ''))) {
        state.notes.set(n.id, n);
        state.queue.set(n.id, { attempts: 0 });
        applied++;
      }
    }
  }
  commitDirty();
  toast(`インポート完了: ${applied} 件を反映しました`);
});

/* ============================================================
   14. トースト・確認ダイアログ
   ============================================================ */
function toast(message, opts = {}) {
  const { action, onAction, secondAction, onSecondAction, duration = 4500, kind } = opts;
  const box = $('toasts');
  const node = el('div', { class: 'toast' + (kind === 'danger' ? ' is-danger' : ''), role: 'status' },
    el('span', { class: 'toast-msg', text: message })
  );
  const dismiss = () => { clearTimeout(timer); node.remove(); };
  if (action) node.append(el('button', {
    class: 'toast-action', type: 'button',
    onclick: () => { dismiss(); onAction && onAction(); }
  }, action));
  if (secondAction) node.append(el('button', {
    class: 'toast-action', type: 'button',
    onclick: () => { dismiss(); onSecondAction && onSecondAction(); }
  }, secondAction));
  node.append(el('button', { class: 'toast-close', type: 'button', 'aria-label': '閉じる', onclick: dismiss }, '×'));
  box.append(node);
  while (box.children.length > 4) box.firstChild.remove();
  const timer = setTimeout(dismiss, duration);
}

let confirmResolve = null;
function choiceDialog(message, buttons) {
  return new Promise(resolve => {
    const overlay = $('confirmOverlay');
    $('confirmMsg').textContent = message;
    const actions = $('confirmActions');
    actions.textContent = '';
    const prevFocus = document.activeElement;
    confirmResolve = value => {
      overlay.hidden = true;
      confirmResolve = null;
      if (prevFocus && prevFocus.isConnected) prevFocus.focus();
      resolve(value);
    };
    for (const b of buttons) {
      actions.append(el('button', {
        class: 'btn' + (b.kind === 'danger' ? ' btn-danger' : b.kind === 'primary' ? ' btn-primary' : ''),
        type: 'button',
        onclick: () => confirmResolve && confirmResolve(b.value)
      }, b.label));
    }
    overlay.hidden = false;
    const btns = actions.querySelectorAll('button');
    btns[btns.length - 1].focus();
  });
}
function confirmDialog(message, { okLabel = 'OK', danger = false } = {}) {
  return choiceDialog(message, [
    { label: 'キャンセル', value: false },
    { label: okLabel, value: true, kind: danger ? 'danger' : 'primary' }
  ]);
}
$('confirmOverlay').addEventListener('click', e => {
  if (e.target === $('confirmOverlay') && confirmResolve) confirmResolve(null);
});

/* ============================================================
   15. キーボード操作・フォーカストラップ
   ============================================================ */
function trapFocus(overlay) {
  overlay.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusables = [...overlay.querySelectorAll(
      'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
    )].filter(x => !x.disabled && !x.hidden && x.offsetParent !== null);
    if (!focusables.length) return;
    const first = focusables[0], last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
}
trapFocus($('editorOverlay'));
trapFocus($('confirmOverlay'));
trapFocus($('digestOverlay'));

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!$('menuPop').hidden) { closeMenu(); return; }
    if (!$('confirmOverlay').hidden) { confirmResolve && confirmResolve(null); return; }
    if (!$('digestOverlay').hidden) { closeDigest(); return; }
    if (!$('editorOverlay').hidden) { closeEditor(false); return; }
    if (document.activeElement === $('searchInput') && $('searchInput').value) {
      $('searchInput').value = '';
      state.search = '';
      render();
    }
    return;
  }
  const t = e.target;
  const typing = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.tagName === 'SELECT' || t.isContentEditable);
  if (!$('editorOverlay').hidden) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); saveEditor(); }
    return;
  }
  if (!$('confirmOverlay').hidden || !$('digestOverlay').hidden || typing) return;
  if (e.key === '/') {
    e.preventDefault();
    $('searchInput').focus();
    $('searchInput').select();
  } else if (e.key === 'n' || e.key === 'N') {
    e.preventDefault();
    $('newBtn').click();
  }
});

/* ============================================================
   16. 初期化
   ============================================================ */
async function init() {
  loadLocal();
  $('sortSelect').value = state.sort;
  render();
  updateBell();

  if (!CONFIG_OK) {
    setSync('local');
    startupDigest();
    return;
  }
  if (!navigator.onLine) {
    setSync('offline');
    startupDigest();
    startPolling();
    return;
  }
  setSync('syncing');
  await pull();               // 起動時差分取得（初回は since=0 で全件）
  if (state.queue.size) flush(); // 前回オフライン中の変更を再送
  else if (state.syncStatus === 'syncing') setSync('ok');
  startPolling();
  startupDigest();

  // 期限バッジ（超過/当日）の表示を毎分見直す
  let lastOverdueKey = '';
  setInterval(() => {
    if (document.visibilityState !== 'visible') return;
    const key = activeNotes()
      .filter(n => n.dueAt && Date.parse(n.dueAt) < Date.now())
      .map(n => n.id).sort().join(',');
    if (key !== lastOverdueKey) { lastOverdueKey = key; render(); }
  }, 60000);
}

init();
</script>
